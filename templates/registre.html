<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registre - Banc de Temps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                
                <div class="card shadow-sm border-0">
                    <div class="card-body p-5">
                        <h2 class="text-center text-success mb-4">Crea el teu compte</h2>
                        <p class="text-center text-muted mb-4">Rebràs 5 hores de saldo inicial de benvinguda!</p>
                        
                        <!-- Formulari que enviarà les dades a la ruta /registre -->
                        <form method="POST" action="/registre">
                            <div class="mb-3">
                                <label class="form-label text-muted">Nom complet</label>
                                <input type="text" name="nom" class="form-control form-control-lg" placeholder="Com et dius?" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label text-muted">Correu electrònic</label>
                                <input type="email" name="correu" class="form-control form-control-lg" placeholder="nom@exemple.cat" required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label text-muted">Contrasenya</label>
                                <input type="password" name="contrasenya" class="form-control form-control-lg" required>
                            </div>
                            
                            <button type="submit" class="btn btn-success btn-lg w-100">Registrar-me ara</button>
                        </form>
                        
                        <!-- Enllaç per tornar a l'inici de sessió -->
                        <div class="text-center mt-4">
                            <p class="mb-0">Ja formes part del banc? <a href="/login" class="text-decoration-none fw-bold text-success">Inicia sessió</a></p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
