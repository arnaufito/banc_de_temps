<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transferir Hores - Banc de Temps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/mercat">Banc de Temps</a>
            <span class="navbar-text text-white fw-bold">El teu saldo: 5.0h</span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 border-top border-primary border-4">
                    <div class="card-body p-5">
                        <h3 class="text-center text-primary mb-4">Pagar Hores</h3>
                        <p class="text-center text-muted mb-4">Transfereix el temps acordat per un servei realitzat.</p>
                        
                        <form>
                            <div class="mb-3">
                                <label class="form-label">Correu del Destinatari (A qui pagues?)</label>
                                <input type="email" class="form-control" placeholder="correu@exemple.cat" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Hores a transferir</label>
                                <div class="input-group">
                                    <input type="number" class="form-control" step="0.25" min="0.25" placeholder="Ex: 1.5" required>
                                    <span class="input-group-text bg-white">hores</span>
                                </div>
                                <small class="text-muted">Pots usar decimals (0.25, 0.5, 1.5...)</small>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">Concepte</label>
                                <input type="text" class="form-control" placeholder="Ex: Classes de mates del divendres" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 btn-lg">Confirmar Transferència</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
