<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transferir Hores - Banc de Temps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Barra de navegació unificada i directa -->
<nav class="navbar navbar-expand navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/mercat">⏳ Banc de Temps</a>
        
        <!-- Enllaços principals sempre visibles -->
        <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="/mercat">Mercat</a></li>
            <li class="nav-item"><a class="nav-link" href="/crear_oferta">Crear Oferta</a></li>
            <li class="nav-item"><a class="nav-link" href="/transferencia">Pagar Hores</a></li>
            <li class="nav-item"><a class="nav-link" href="/historial">Historial</a></li>
            <li class="nav-item"><a class="nav-link" href="/xat">Xats 💬</a></li>
        </ul>
        
        <!-- Opcions de l'usuari a la dreta -->
        <ul class="navbar-nav align-items-center">
            <li class="nav-item me-3"><span class="text-white fw-bold">Saldo: 5.0h</span></li>
            <li class="nav-item"><a class="nav-link" href="/perfil">Perfil</a></li>
            <li class="nav-item"><a class="btn btn-outline-light btn-sm ms-2" href="/logout">Sortir</a></li>
        </ul>
    </div>
</nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 border-top border-primary border-4">
                    <div class="card-body p-5">
                        <h3 class="text-center text-primary mb-4">Pagar Hores</h3>
                        <p class="text-center text-muted mb-4">Transfereix el temps acordat per un servei realitzat.</p>
                        
                        <form>
                            <div class="mb-3">
                                <label class="form-label">Correu del Destinatari (A qui pagues?)</label>
                                <input type="email" class="form-control" placeholder="correu@exemple.cat" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Hores a transferir</label>
                                <div class="input-group">
                                    <input type="number" class="form-control" step="0.25" min="0.25" placeholder="Ex: 1.5" required>
                                    <span class="input-group-text bg-white">hores</span>
                                </div>
                                <small class="text-muted">Pots usar decimals (0.25, 0.5, 1.5...)</small>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">Concepte</label>
                                <input type="text" class="form-control" placeholder="Ex: Classes de mates del divendres" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 btn-lg">Confirmar Transferència</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
