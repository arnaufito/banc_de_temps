<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banc de Temps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container text-center mt-5">
        {% if 'nom' in session %}
            <h1 class="text-primary">Hola, {{ session['nom'] }}!</h1>
            <p class="lead">Benvingut de nou al teu espai.</p>
            <a href="/logout" class="btn btn-danger mt-3">Tancar sessió</a>
        {% else %}
            <h1 class="text-primary">Benvingut al Banc de Temps</h1>
            <p class="lead">El teu saldo inicial serà de 5 hores.</p>
            <a href="/login" class="btn btn-primary mt-3">Inicia Sessió</a>
            <a href="/registre" class="btn btn-outline-primary mt-3">Registra't</a>
        {% endif %}
    </div>

</body>
</html>
