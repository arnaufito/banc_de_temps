<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xat - Banc de Temps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Banc de Temps</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <div class="card shadow-sm border-0">
                    <!-- Capçalera del xat -->
                    <div class="card-header bg-white py-3">
                        <h5 class="mb-0 text-primary">Conversa amb: Maria P.</h5>
                        <small class="text-muted">Oferta: Formateig d'ordinadors</small>
                    </div>
                    
                    <!-- Finestra de missatges -->
                    <div class="card-body bg-light" style="height: 400px; overflow-y: auto;">
                        
                        <!-- Missatge rebut (Esquerra) -->
                        <div class="d-flex justify-content-start mb-3">
                            <div class="bg-white p-3 rounded shadow-sm" style="max-width: 75%;">
                                <p class="mb-0">Hola! He vist que ofereixes el servei de formatejar ordinadors. Podries ajudar-me aquest divendres?</p>
                                <small class="text-muted" style="font-size: 0.75rem;">10:30</small>
                            </div>
                        </div>

                        <!-- Missatge enviat (Dreta) -->
                        <div class="d-flex justify-content-end mb-3">
                            <div class="bg-primary text-white p-3 rounded shadow-sm" style="max-width: 75%;">
                                <p class="mb-0">I tant! Cap problema. Visc a prop de l'Eixample, ens podem trobar a la biblioteca?</p>
                                <small class="text-light" style="font-size: 0.75rem;">10:35</small>
                            </div>
                        </div>
                        
                    </div>
                    
                    <!-- Barra d'escriure -->
                    <div class="card-footer bg-white border-0 py-3">
                        <form class="d-flex">
                            <input type="text" class="form-control me-2" placeholder="Escriu un missatge...">
                            <button type="submit" class="btn btn-primary">Enviar</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
