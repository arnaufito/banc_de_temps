<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Oferta - Banc de Temps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Barra de navegació unificada definitiva -->
<nav class="navbar navbar-expand navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/mercat">⏳ Banc de Temps</a>
        
        <!-- Enllaços principals -->
        <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="/mercat">Mercat</a></li>
            <li class="nav-item"><a class="nav-link" href="/crear_oferta">Crear Oferta</a></li>
            <li class="nav-item"><a class="nav-link" href="/transferencia">Pagar Hores</a></li>
            <li class="nav-item"><a class="nav-link" href="/historial">Historial</a></li>
            <li class="nav-item"><a class="nav-link" href="/xat">Xats 💬</a></li>
        </ul>
        
        <!-- Saldo i opcions d'usuari a la dreta -->
        <ul class="navbar-nav align-items-center">
            <li class="nav-item me-3">
                <span class="navbar-text text-white fw-bold">Saldo: 5.0h</span>
            </li>
            <li class="nav-item"><a class="nav-link" href="/perfil">Perfil</a></li>
            <li class="nav-item"><a class="btn btn-outline-light btn-sm ms-2" href="/logout">Sortir</a></li>
        </ul>
    </div>
</nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-5">
                        <h3 class="text-primary mb-4">Publicar un nou servei</h3>
                        
                        <!-- El mètode POST ja està ben posat -->
                        <form action="/crear_oferta" method="POST">
                            
                            <!-- Títol -->
                             <div class="mb-3">
                                <label class="form-label text-muted">Títol de l'oferta</label>
                                <input type="text" name="titol" class="form-control" placeholder="Ex: Classes de piano" required>
                             </div>
                             
                             <!-- Categoria -->
                             <div class="mb-3">
                                <label class="form-label text-muted">Categoria</label>
                                <select name="categoria" class="form-select">
                                    <option>Educació i Classes</option>
                                    <option>Informàtica i Tecnologia</option>
                                    <option>Bricolatge i Llar</option>
                                    <option>Cura de mascotes</option>
                                    <option>Altres</option>
                                </select>
                            </div>
                            
                            <!-- NOU CAMP: Descripció -->
                            <div class="mb-3">
                                <label class="form-label text-muted">Descripció</label>
                                <textarea name="descripcio" class="form-control" rows="3" placeholder="Explica els detalls de la teva oferta..." required></textarea>
                            </div>

                            <!-- Hores -->
                            <div class="mb-3">
                                <label class="form-label text-muted">Hores</label>
                                <input type="number" name="hores" class="form-control" placeholder="Hores" required>
                            </div>
                            
                            <!-- SOLUCIÓ: Ara això és un botó submit real que enviarà el formulari -->
                            <button type="submit" class="btn btn-primary w-100">Publicar nova oferta</button>
                            
                        </form>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
