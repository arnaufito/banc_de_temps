<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Oferta - Banc de Temps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/mercat">Banc de Temps</a>
            <span class="navbar-text text-white fw-bold">Saldo: 5.0h</span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-5">
                        <h3 class="text-primary mb-4">Publicar un nou servei</h3>
                        <form action="/publicar" method="POST">
                            <!-- Títol -->
                             <div class="mb-3">
                                <label class="form-label text-muted">Títol de l'oferta</label>
                                <input type="text" name="titol" class="form-control" placeholder="Ex: Classes de piano">
                             </div>
                             <!-- Categoria (IMPORTANT: el SELECT també necessita NAME!) -->
                             <div class="mb-3">
                                <label class="form-label text-muted">Categoria</label>
                                <select name="categoria" class="form-select">
                                    <option>Educació i Classes</option>
                                    <option>Informàtica i Tecnologia</option>
                                    <option>Bricolatge i Llar</option><option>Cura de mascotes</option>
                                    <option>Altres</option>
                                </select>
                            </div>
                            <!-- No t'oblidis d'afegir el camp d'hores si el necessites -->
                            <div class="mb-3">
                                <label class="form-label text-muted">Hores</label>
                                <input type="number" name="hores" class="form-control" placeholder="Hores">
                            </div>
                            <a href="/mercat" class="btn btn-primary">Publicar nova oferta</a>
                        </form>
                        

                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
