<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inici de Sessió - Banc de Temps</title>
    <!-- Connectem Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Contenidor principal que centra els elements -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                
                <!-- Caixa del formulari (Card) -->
                <div class="card shadow-sm border-0">
                    <div class="card-body p-5">
                        <h2 class="text-center text-primary mb-4">Inicia Sessió</h2>
                        
                        <!-- Formulari que enviarà les dades a la ruta /login -->
                        <form method="POST" action="/login">
                            <div class="mb-3">
                                <label class="form-label text-muted">Correu electrònic</label>
                                <input type="email" name="correu" class="form-control form-control-lg" placeholder="nom@exemple.cat" required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label text-muted">Contrasenya</label>
                                <input type="password" name="contrasenya" class="form-control form-control-lg" required>
                            </div>
                            
                            <button type="submit" class="btn btn-primary btn-lg w-100">Entrar al Banc</button>
                        </form>
                        
                        <!-- Enllaç per anar al registre -->
                        <div class="text-center mt-4">
                            <p class="mb-0">No tens compte? <a href="/registre" class="text-decoration-none fw-bold">Crea'n un aquí</a></p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
