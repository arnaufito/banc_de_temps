<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detall de l'Oferta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Barra de navegació -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/mercat">⬅ Tornar al Mercat</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <!-- Columna principal amb la informació de l'oferta -->
            <div class="col-md-8">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body p-5">
                        <span class="badge bg-info text-dark mb-2">Categoria pendent</span>
                        
                        <!-- Títol de l'oferta (oferta[1]) -->
                        <h1 class="text-primary mb-4">{{ oferta[1] }}</h1>
                        
                        <h5 class="text-muted">Descripció de la tasca:</h5>
                        <!-- Descripció de l'oferta (oferta[2]) -->
                        <p class="fs-5">{{ oferta[2] }}</p>
                    </div>
                </div>
            </div>

            <!-- Columna lateral amb la info de l'usuari i accions -->
            <div class="col-md-4">
                <div class="card shadow-sm border-0 bg-white">
                    <div class="card-body p-4 text-center">
                        <h3 class="fw-bold text-success mb-3">{{ oferta[3] }} Hores</h3>
                        <hr>
                        <!-- Textos preparats per quan tinguem la informació de l'usuari -->
                        <p class="mb-1 text-muted">Oferta publicada per:</p>
                        <h5 class="fw-bold">Nom de l'Usuari</h5>
                        <p class="text-muted small">📍 Ciutat de l'usuari</p>
                        
                        <hr>
                        <!-- Aquest botó de moment no fa res, però serà el del xat -->
                        <button class="btn btn-primary w-100 mb-2">💬 Contactar (Pròximament)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
