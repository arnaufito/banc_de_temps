<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercat de Serveis - Banc de Temps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Banc de Temps</a>
            <span class="navbar-text text-white fw-bold">Saldo: 5.0h</span>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary">Ofertes Disponibles</h2>
            <!-- En lloc d'un <button>, utilitzem un enllaç <a> amb les classes de botó que ja tinguis -->
            <a href="/crear_oferta" class="btn btn-primary">Publicar nova oferta</a>
        </div>

        <!-- Graella d'anuncis -->
            <div class="row">
                <!-- Inici del bucle: crea una targeta per cada oferta de la base de dades -->
                 {% for oferta in ofertes %}
                 <div class="col-md-4 mb-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title">{{ oferta[1] }}</h5> <!-- Aquí sortirà el Títol -->
                            <p class="card-text">{{ oferta[2] }}</p>      <!-- Aquí sortirà la Descripció -->
                            <p><strong>Hores de cost:</strong> {{ oferta[3] }}</p>
                            <!-- Aquest botó ens portarà a la pàgina de contactar -->
                             <a href="{{ url_for('detall_oferta', id_oferta=oferta[0]) }}" class="btn btn-primary">
                                Veure detalls i contactar
                            </a>
                        </div>
                    </div>
                </div>
                <!-- Què passa si no hi ha cap oferta? Ho controlem amb aquest 'else' -->
                 {% else %}
                 <div class="col-12 text-center mt-5">
                    <h4>El mercat està buit ara mateix.</h4>
                    <p class="text-muted">Anima't i publica la primera feina!</p>
                </div>
    {% endfor %}
</div>
</div>
</div>

</body>
</html>
