<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Meu Perfil - Banc de Temps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Barra de navegació unificada definitiva -->
<nav class="navbar navbar-expand navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/mercat">⏳ Banc de Temps</a>
        
        <!-- Enllaços principals -->
        <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="/mercat">Mercat</a></li>
            <li class="nav-item"><a class="nav-link" href="/crear_oferta">Crear Oferta</a></li>
            <li class="nav-item"><a class="nav-link" href="/transferencia">Pagar Hores</a></li>
            <li class="nav-item"><a class="nav-link" href="/historial">Historial</a></li>
            <li class="nav-item"><a class="nav-link" href="/xat">Xats 💬</a></li>
        </ul>
        
        <!-- Saldo i opcions d'usuari a la dreta -->
        <ul class="navbar-nav align-items-center">
            <li class="nav-item me-3">
                <span class="navbar-text text-white fw-bold">Saldo: 5.0h</span>
            </li>
            <li class="nav-item"><a class="nav-link" href="/perfil">Perfil</a></li>
            <li class="nav-item"><a class="btn btn-outline-light btn-sm ms-2" href="/logout">Sortir</a></li>
        </ul>
    </div>
</nav>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-5">
                        <h3 class="text-primary border-bottom pb-2 mb-4">Configuració del Perfil</h3>
                        
                        <form>
                            <!-- Foto de perfil (Simulació) -->
                            <div class="text-center mb-4">
                                <div class="bg-secondary rounded-circle d-inline-block" style="width: 120px; height: 120px; line-height: 120px; color: white; font-size: 3rem;">
                                    👤
                                </div>
                                <div class="mt-2">
                                    <button class="btn btn-sm btn-outline-primary">Canviar foto</button>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-muted">Nom a mostrar</label>
                                    <input type="text" class="form-control" value="Joan Garcia">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-muted">Ubicació (Barri / Ciutat)</label>
                                    <input type="text" class="form-control" value="Gràcia, Barcelona">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-muted">Sobre mi (Descripció)</label>
                                <textarea class="form-control" rows="4">Sóc un apassionat de la informàtica i la cuina. M'agrada ajudar a arreglar ordinadors i estic aprenent a fer pa artesanal.</textarea>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Guardar Canvis</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
